{% extends "auth/base_auth.html" %}

{% block title %}Cadastrar{% endblock %}

{% block content %}
<div class="auth-title">Criar conta de aluno</div>
<div class="auth-subtitle">Preencha seus dados para acessar o sistema</div>

<form method="POST" action="{{ url_for('auth.registrar') }}" novalidate>
  <div class="form-group">
    <label for="nome">Nome completo</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome completo"
           value="{{ form.get('nome', '') }}" required autofocus>
  </div>

  <div class="auth-row">
    <div class="form-group">
      <label for="cpf">CPF</label>
      <input type="text" id="cpf" name="cpf" placeholder="somente números" maxlength="14"
             value="{{ form.get('cpf', '') }}" required>
    </div>
    <div class="form-group">
      <label for="sexo">Sexo</label>
      <select id="sexo" name="sexo" required>
        <option value="">Selecione</option>
        <option value="F" {% if form.get('sexo') == 'F' %}selected{% endif %}>Feminino</option>
        <option value="M" {% if form.get('sexo') == 'M' %}selected{% endif %}>Masculino</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label for="data_nascimento">Data de nascimento</label>
    <input type="date" id="data_nascimento" name="data_nascimento"
           value="{{ form.get('data_nascimento', '') }}" required>
  </div>

  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="seu.nome@aluno.unb.br"
           value="{{ form.get('email', '') }}" required>
  </div>

  <div class="auth-row">
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="mín. 8 caracteres" required>
    </div>
    <div class="form-group">
      <label for="confirmar_senha">Confirmar senha</label>
      <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="repita a senha" required>
    </div>
  </div>

  <button type="submit" class="btn btn-success btn-block">Criar conta</button>
</form>

<div class="auth-footer">
  Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
</div>
{% endblock %}
