{% extends "auth/base_auth.html" %}

{% block title %}Entrar{% endblock %}

{% block content %}
<div class="auth-title">Entrar na sua conta</div>
<div class="auth-subtitle">Acesse o painel acadêmico da UnB</div>

<form method="POST" action="{{ url_for('auth.login') }}" novalidate>
  <div class="form-group">
    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="seu.nome@aluno.unb.br"
           value="{{ form.get('email', '') }}" required autofocus>
  </div>

  <div class="form-group">
    <label for="senha">Senha</label>
    <input type="password" id="senha" name="senha" placeholder="••••••••" required>
  </div>

  <button type="submit" class="btn btn-primary btn-block">Entrar</button>
</form>

<div class="auth-footer">
  <a href="{{ url_for('auth.esqueci_senha') }}">Esqueci minha senha</a>
  &nbsp;·&nbsp;
  Não tem conta? <a href="{{ url_for('auth.registrar') }}">Cadastre-se</a>
</div>
{% endblock %}
