{% extends "auth/base_auth.html" %}

{% block title %}Redefinir senha{% endblock %}

{% block content %}
<div class="auth-title">Redefinir senha</div>
<div class="auth-subtitle">Confirme seu e-mail e CPF para criar uma nova senha</div>

<form method="POST" action="{{ url_for('auth.esqueci_senha') }}" novalidate>
  <div class="form-group">
    <label for="email">E-mail cadastrado</label>
    <input type="email" id="email" name="email" placeholder="seu.nome@aluno.unb.br"
           value="{{ form.get('email', '') }}" required autofocus>
  </div>

  <div class="form-group">
    <label for="cpf">CPF</label>
    <input type="text" id="cpf" name="cpf" placeholder="somente números" maxlength="14"
           value="{{ form.get('cpf', '') }}" required>
  </div>

  <div class="auth-row">
    <div class="form-group">
      <label for="nova_senha">Nova senha</label>
      <input type="password" id="nova_senha" name="nova_senha" placeholder="mín. 8 caracteres" required>
    </div>
    <div class="form-group">
      <label for="confirmar_senha">Confirmar nova senha</label>
      <input type="password" id="confirmar_senha" name="confirmar_senha" placeholder="repita a senha" required>
    </div>
  </div>

  <button type="submit" class="btn btn-primary btn-block">Redefinir senha</button>
</form>

<div class="auth-footer">
  Lembrou a senha? <a href="{{ url_for('auth.login') }}">Voltar ao login</a>
</div>
{% endblock %}
